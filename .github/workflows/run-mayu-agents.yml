name: Run MAYU Agents

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Modo a ejecutar"
        type: choice
        required: true
        default: "morning_reports"
        options:
          - morning_reports
          - daily_pulse
          - bodega_materiales
          - bodega_materiales_admin
          - bodega_materiales_respuestas
          - finanzas
          - finanzas_admin
          - finanzas_dte_inbox
          - finanzas_respuestas
          - bice_cartola_mail
          - test
      date:
        description: "Fecha YYYY-MM-DD"
        required: false
        default: ""
      send_email:
        description: "Enviar correo"
        type: boolean
        required: false
        default: true
  schedule:
    # Lunes a viernes 12:00 UTC (~08:00 Chile horario actual).
    # Ejecuta los tres reportes de la manana juntos para evitar atrasos/drops
    # de GitHub Actions cuando hay varios crons separados.
    - cron: "0 12 * * 1-5"
    # Lunes a viernes, respuestas a dudas del correo Bodega + Materiales.
    # Parte despues de los reportes de la manana para no solapar con 12:00 UTC.
    - cron: "30,45 12 * * 1-5"
    - cron: "*/15 13-22 * * 1-5"
    # Lunes a viernes 15:10 UTC (~11:10 Chile horario actual). Cartola BICE por correo.
    - cron: "10 15 * * 1-5"
    # Lunes a viernes, respuestas a dudas del correo Finanzas, alternado con Bodega+Materiales.
    - cron: "5,20,35,50 13-22 * * 1-5"

permissions:
  contents: read

concurrency:
  group: mayu-agents-operational
  cancel-in-progress: false

jobs:
  run:
    name: Run MAYU operational agents
    runs-on: ubuntu-latest
    env:
      MayuTenantId: ${{ vars.MAYU_GRAPH_TENANT_ID }}
      MayuClientId: ${{ vars.MAYU_GRAPH_CLIENT_ID }}
      MayuClientSecret: ${{ secrets.MAYU_GRAPH_CLIENT_SECRET }}
      MayuOpenAiApiKey: ${{ secrets.MAYU_OPENAI_API_KEY }}
      MayuOpenAiModel: ${{ vars.MAYU_OPENAI_MODEL }}
      MayuFirebaseApiKey: ${{ vars.MAYU_FIREBASE_API_KEY }}
      MAYU_FIREBASE_API_KEY: ${{ vars.MAYU_FIREBASE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve run mode
        id: resolve
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $mode = "${{ inputs.run_mode }}"
            $date = "${{ inputs.date }}"
            $sendEmail = "${{ inputs.send_email }}"
          } else {
            if ("${{ github.event.schedule }}" -eq "0 12 * * 1-5") {
              $mode = "morning_reports"
            } elseif ("${{ github.event.schedule }}" -eq "30,45 12 * * 1-5" -or "${{ github.event.schedule }}" -eq "*/15 13-22 * * 1-5") {
              $mode = "bodega_materiales_respuestas"
            } elseif ("${{ github.event.schedule }}" -eq "10 15 * * 1-5") {
              $mode = "bice_cartola_mail"
            } elseif ("${{ github.event.schedule }}" -eq "5,20,35,50 13-22 * * 1-5") {
              $mode = "finanzas_respuestas"
            } else {
              $mode = "daily_pulse"
            }
            $date = ""
            $sendEmail = "true"
          }
          if ([string]::IsNullOrWhiteSpace($sendEmail)) { $sendEmail = "true" }
          "run_mode=$mode" >> $env:GITHUB_OUTPUT
          "date=$date" >> $env:GITHUB_OUTPUT
          "send_email=$sendEmail" >> $env:GITHUB_OUTPUT
          Write-Output "Modo resuelto: $mode / Fecha=$date / SendEmail=$sendEmail"

      - name: Install BICE XLS parser dependency
        if: steps.resolve.outputs.run_mode == 'bice_cartola_mail'
        shell: bash
        run: python -m pip install --user xlrd

      - name: Run MAYU agents
        shell: pwsh
        run: |
          $required = @(
            "MayuTenantId",
            "MayuClientId",
            "MayuClientSecret"
          )
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Falta variable o secret requerido: $name"
            }
          }

          $configPath = Join-Path $pwd "config/mayu_agents_config.json"
          $env:MayuAgentsConfigJson = Get-Content -Raw -Path $configPath
          if ([string]::IsNullOrWhiteSpace($env:TEMP) -and -not [string]::IsNullOrWhiteSpace($env:RUNNER_TEMP)) {
            $env:TEMP = $env:RUNNER_TEMP
          }

          $send = [System.Convert]::ToBoolean("${{ steps.resolve.outputs.send_email }}")
          & ./runtime/MayuAgents.core.ps1 `
            -Mode "${{ steps.resolve.outputs.run_mode }}" `
            -Date "${{ steps.resolve.outputs.date }}" `
            -SendEmail:$send
