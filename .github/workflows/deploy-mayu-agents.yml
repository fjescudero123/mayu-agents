name: Deploy MAYU Agents

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Prueba a ejecutar despues del deploy"
        type: choice
        required: true
        default: "deploy_only"
        options:
          - deploy_only
          - test
          - weekly_report
          - manual_due_sweep
          - monthly_report
      lookback_days:
        description: "Dias hacia atras para manual_due_sweep"
        required: false
        default: "7"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-mayu-agents.yml"
      - "config/**"
      - "runbooks/**"
      - "runtime/**"
      - "scripts/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: mayu-agents-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy fiscalizador reuniones
    runs-on: ubuntu-latest
    environment: mayu-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Publish runtime and runbook
        shell: pwsh
        run: |
          ./scripts/Deploy-Fiscalizador.ps1 `
            -SubscriptionId "${{ vars.AZURE_SUBSCRIPTION_ID }}" `
            -GraphTenantId "${{ vars.MAYU_GRAPH_TENANT_ID }}" `
            -GraphClientId "${{ vars.MAYU_GRAPH_CLIENT_ID }}" `
            -GraphClientSecret "${{ secrets.MAYU_GRAPH_CLIENT_SECRET }}" `
            -OpenAiApiKey "${{ secrets.MAYU_OPENAI_API_KEY }}" `
            -OpenAiModel "${{ vars.MAYU_OPENAI_MODEL }}"

      - name: Run manual verification
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mode != 'deploy_only' }}
        shell: pwsh
        run: |
          ./scripts/Start-FiscalizadorJob.ps1 `
            -SubscriptionId "${{ vars.AZURE_SUBSCRIPTION_ID }}" `
            -Mode "${{ inputs.run_mode }}" `
            -LookbackDays "${{ inputs.lookback_days }}"
